services:

  db:
    image: postgres:16

    container_name: superset-db

    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: supersetpassword

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  superset:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: superset

    restart: unless-stopped

    depends_on:
      - db

    ports:
      - "8007:8088"

    environment:

      SUPERSET_ENV: production

      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py

      SUPERSET_SECRET_KEY: change-this-secret-key

      DATABASE_DIALECT: postgresql
      DATABASE_USER: superset
      DATABASE_PASSWORD: supersetpassword
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset

    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py

    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password mypassword || true &&
      superset init &&
      gunicorn --bind 0.0.0.0:8088 --workers 4 --timeout 120 'superset.app:create_app()'
      "

    cpus: 4.0
    mem_limit: 4g
  trino:
    image: trinodb/trino:477
    container_name: trino
    env_file:
      - .env
    ports:
      - "8008:8080"
    volumes:
      - ./trino/etc:/etc/trino
    restart: unless-stopped

volumes:
  postgres-data:
